# Font
font_family      JetBrains Mono Nerd Font
font_size 11.0

# Cursor
cursor_shape beam
cursor_trail 1

# Padding (why weird value? consistency with foot)
window_margin_width 21.75

# No stupid close confirmation
confirm_os_window_close 0

# Use fish shell
shell zsh

# Copy
map ctrl+c    copy_or_interrupt

# Search
map ctrl+f   launch --location=hsplit --allow-remote-control kitty +kitten search.py @active-kitty-window-id
map kitty_mod+f   launch --location=hsplit --allow-remote-control kitty +kitten search.py @active-kitty-window-id

# Scroll & Zoom
map page_up    scroll_page_up
map page_down    scroll_page_down

map ctrl+plus  change_font_size all +1
map ctrl+equal  change_font_size all +1
map ctrl+kp_add  change_font_size all +1
map ctrl+minus       change_font_size all -1
map ctrl+underscore       change_font_size all -1
map ctrl+kp_subtract       change_font_size all -1
map ctrl+0 change_font_size all 0
map ctrl+kp_0 change_font_size all 0

# ── Visuals / Wayland ──────────────────────────────────────────────────────────
wayland_titlebar_color background
background              #1e1e2e
foreground              #ffffff
selection_background    #313244
selection_foreground    #1e1e2e
background_opacity      0.77
dynamic_background_opacity yes
enable_audio_bell       no
confirm_os_window_close 0

# Slight padding + thin border for the “glass” look
window_margin_width     8
window_border_width     1
placement_strategy      center

# ── Cursor ─────────────────────────────────────────────────────────────────────
cursor                  #7aa2f7
cursor_shape            beam
cursor_beam_thickness   1.6
cursor_blink_interval   1
cursor_trail            1

# ── Font ──────────────────────────────────────────────────────────────────────
font_family             JetBrainsMono Nerd Font
bold_font               auto
italic_font             auto
font_size               14.0
disable_ligatures       never
adjust_line_height      0

# ── Colors (yours, untouched) ─────────────────────────────────────────────────
color0   #232339
color1   #f38ba8
color2   #a6e3a1
color3   #f9e2af
color4   #7aa2f7
color5   #b4befe
color6   #94e2d5
color7   #cdd6f4
color8   #6c7086
color9   #f38ba8
color10  #a6e3a1
color11  #f9e2af
color12  #7aa2f7
color13  #b4befe
color14  #94e2d5
color15  #ffffff

bold_color              #ffffff
italic_color            #b4befe
underline_color         #f38ba8

# ── Tabs ──────────────────────────────────────────────────────────────────────
tab_bar_style           fade
active_tab_background   #313244
active_tab_foreground   #7aa2f7
inactive_tab_background #232339
inactive_tab_foreground #6c7086
tab_title_template      "{index}:{title:.30}"

# ── Selection / Clipboard / URLs ──────────────────────────────────────────────
copy_on_select          yes
strip_trailing_spaces   smart
detect_urls             yes
open_url_with           default
url_style               double
# Fast open: Ctrl+Shift+E to fuzzy-pick visible URLs
map ctrl+shift+e        kitten hints --type=regex --regex '(https?://\S+)'

# ── Scrolling / History ───────────────────────────────────────────────────────
scrollback_lines        20000
wheel_scroll_multiplier 1.0

# ── Quality-of-life keybinds ──────────────────────────────────────────────────
map ctrl+shift+c        copy_to_clipboard
map ctrl+shift+v        paste_from_clipboard
map ctrl+shift+t        new_tab
map ctrl+shift+w        close_tab
map ctrl+shift+enter    new_os_window
map ctrl+shift+f        search_in_terminal

# ── Performance nits ──────────────────────────────────────────────────────────
repaint_delay           7
input_delay             1
sync_to_monitor         yes

# ── Right-click “context menu” (needs script below) ───────────────────────────
# mouse_map right press ungrabbed launch $HOME/.config/kitty/scripts/kitty-menu.sh

mouse_map ctrl+right press ungrabbed launch $HOME/.config/kitty/scripts/mini-menu.sh
